<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;family=DM+Sans:wght@300;400;600&amp;display=swap');
    </style>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e8e8e8" stroke-width="0.5" opacity="0.6"/>
    </pattern>
    <!-- Thin accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111111" stop-opacity="0"/>
      <stop offset="20%" stop-color="#111111" stop-opacity="1"/>
      <stop offset="80%" stop-color="#111111" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dotFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cccccc" stop-opacity="0"/>
      <stop offset="30%" stop-color="#cccccc" stop-opacity="1"/>
      <stop offset="70%" stop-color="#cccccc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#cccccc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background: pure off-white -->
  <rect width="900" height="280" fill="#fafafa"/>

  <!-- Subtle grid overlay -->
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Left decorative bracket -->
  <text x="52" y="158" font-family="'DM Mono', 'Courier New', monospace" font-size="72" font-weight="400" fill="#ececec">{</text>

  <!-- Right decorative bracket -->
  <text x="816" y="158" font-family="'DM Mono', 'Courier New', monospace" font-size="72" font-weight="400" fill="#ececec">}</text>

  <!-- Small label above name -->
  <text x="450" y="98" font-family="'DM Mono', 'Courier New', monospace" font-size="10"
        text-anchor="middle" fill="#aaaaaa" letter-spacing="4">SOFTWARE ENGINEER</text>

  <!-- Thin rule above name -->
  <rect x="340" y="106" width="220" height="0.75" fill="url(#accentLine)" opacity="0.3"/>

  <!-- Name — the hero, clean & large -->
  <text x="450" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="48"
        font-weight="400" text-anchor="middle" fill="#111111" letter-spacing="1">
    Irfanul Amin
  </text>

  <!-- Tagline -->
  <text x="450" y="182" font-family="'DM Mono', 'Courier New', monospace" font-size="12"
        text-anchor="middle" fill="#888888" letter-spacing="1">
    Building products people actually use
  </text>

  <!-- Thin rule below tagline -->
  <rect x="300" y="198" width="300" height="0.75" fill="url(#accentLine)" opacity="0.25"/>

  <!-- Stack pills — minimal text row -->
  <text x="450" y="222" font-family="'DM Mono', 'Courier New', monospace" font-size="10"
        text-anchor="middle" fill="#bbbbbb" letter-spacing="2">
    React · Next.js · TypeScript · Node · NestJS · PostgreSQL
  </text>

  <!-- Location + org line -->
  <text x="450" y="248" font-family="'DM Mono', 'Courier New', monospace" font-size="10"
        text-anchor="middle" fill="#cccccc" letter-spacing="1">
    Dhaka, Bangladesh  ·  CreateDevs
  </text>

  <!-- Bottom cursor blink decoration -->
  <rect x="448" y="258" width="8" height="1.5" fill="#aaaaaa" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>

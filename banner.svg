<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="faint" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="360" fill="#0a0f0a"/>

  <!-- ── WINDOW CHROME ── -->
  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="34" fill="#111811"/>
  <line x1="0" y1="34" x2="900" y2="34" stroke="#1e3320" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="17" r="5.5" fill="#3a1a1a" opacity="0.9"/>
  <circle cx="38" cy="17" r="5.5" fill="#3a3a1a" opacity="0.9"/>
  <circle cx="56" cy="17" r="5.5" fill="#1a3a1a" opacity="0.9">
    <animate attributeName="fill" values="#1a3a1a;#00ff41;#1a3a1a" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Window title -->
  <text x="450" y="22" font-family="'Courier New', monospace" font-size="11"
        text-anchor="middle" fill="#2d6e35" letter-spacing="2">
    irfanulamin — bash — 120×40
  </text>

  <!-- ── TERMINAL BODY ── -->
  <!-- Line 1: prompt + whoami output -->
  <text x="28" y="70" font-family="'Courier New', monospace" font-size="13" fill="#2d6e35" opacity="0.5">~</text>
  <text x="44" y="70" font-family="'Courier New', monospace" font-size="13" fill="#00ff41" filter="url(#faint)">❯</text>
  <text x="60" y="70" font-family="'Courier New', monospace" font-size="13" fill="#4aad5a" letter-spacing="0.5">whoami</text>

  <!-- Line 2: name output — the hero -->
  <text x="28" y="100" font-family="'Courier New', monospace" font-size="28"
        font-weight="700" fill="#00ff41" letter-spacing="3" filter="url(#glow)">
    Irfanul Amin
    <animate attributeName="opacity" values="0.9;1;0.9" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Line 3: blank + next prompt -->
  <text x="28" y="136" font-family="'Courier New', monospace" font-size="13" fill="#2d6e35" opacity="0.5">~</text>
  <text x="44" y="136" font-family="'Courier New', monospace" font-size="13" fill="#00ff41" filter="url(#faint)">❯</text>
  <text x="60" y="136" font-family="'Courier New', monospace" font-size="13" fill="#4aad5a" letter-spacing="0.5">cat profile.json</text>

  <!-- Line 4: JSON output block -->
  <text x="28" y="164" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.9">{</text>

  <text x="44" y="184" font-family="'Courier New', monospace" font-size="12" fill="#2d6e35" opacity="0.8">  "role"</text>
  <text x="116" y="184" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.7">:</text>
  <text x="126" y="184" font-family="'Courier New', monospace" font-size="12" fill="#4aad5a" opacity="0.9">  "Software Engineer"</text>
  <text x="370" y="184" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.5">,</text>

  <text x="44" y="202" font-family="'Courier New', monospace" font-size="12" fill="#2d6e35" opacity="0.8">  "org"</text>
  <text x="108" y="202" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.7">:</text>
  <text x="118" y="202" font-family="'Courier New', monospace" font-size="12" fill="#4aad5a" opacity="0.9">   "CreateDevs"</text>
  <text x="307" y="202" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.5">,</text>

  <text x="44" y="220" font-family="'Courier New', monospace" font-size="12" fill="#2d6e35" opacity="0.8">  "location"</text>
  <text x="148" y="220" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.7">:</text>
  <text x="158" y="220" font-family="'Courier New', monospace" font-size="12" fill="#4aad5a" opacity="0.9">"Dhaka, Bangladesh"</text>
  <text x="368" y="220" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.5">,</text>

  <text x="44" y="238" font-family="'Courier New', monospace" font-size="12" fill="#2d6e35" opacity="0.8">  "learning"</text>
  <text x="148" y="238" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.7">:</text>
  <text x="158" y="238" font-family="'Courier New', monospace" font-size="12" fill="#4aad5a" opacity="0.9">["Python", "Django"]</text>
  <text x="348" y="238" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.5">,</text>

  <text x="44" y="256" font-family="'Courier New', monospace" font-size="12" fill="#2d6e35" opacity="0.8">  "stack"</text>
  <text x="118" y="256" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.7">:</text>
  <text x="128" y="256" font-family="'Courier New', monospace" font-size="12" fill="#4aad5a" opacity="0.9">  ["React", "Next.js", "TypeScript", "Node", "Express", "MongoDB"]</text>

  <text x="44" y="274" font-family="'Courier New', monospace" font-size="12" fill="#2d6e35" opacity="0.8">  "contact"</text>
  <text x="140" y="274" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.7">:</text>
  <text x="150" y="274" font-family="'Courier New', monospace" font-size="12" fill="#4aad5a" opacity="0.9">"irfanulamin10@gmail.com"</text>
  <text x="396" y="274" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.5">,</text>

  <text x="44" y="292" font-family="'Courier New', monospace" font-size="12" fill="#2d6e35" opacity="0.8">  "social"</text>
  <text x="124" y="292" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.7">:</text>
  <text x="134" y="292" font-family="'Courier New', monospace" font-size="12" fill="#4aad5a" opacity="0.9">  "linkedin · instagram · facebook"</text>

  <text x="28" y="310" font-family="'Courier New', monospace" font-size="12" fill="#1e5c26" opacity="0.9">}</text>

  <!-- Line 5: new prompt with blinking cursor -->
  <text x="28" y="340" font-family="'Courier New', monospace" font-size="13" fill="#2d6e35" opacity="0.5">~</text>
  <text x="44" y="340" font-family="'Courier New', monospace" font-size="13" fill="#00ff41" filter="url(#faint)">❯</text>

</svg>
